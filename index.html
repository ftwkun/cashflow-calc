<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Limit Calculator</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Лимит">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; padding: 1.5rem 1rem; }
.container { max-width: 560px; margin: 0 auto; }
.top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
h1 { font-size: 18px; font-weight: 500; color: #1a1a1a; }
.controls { display: flex; gap: 6px; }
.toggle-btn { background: none; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; padding: 4px 10px; font-size: 12px; cursor: pointer; color: #666; }
.toggle-btn:hover { background: #ebebea; }
.toggle-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.section { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.section-title { font-size: 12px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.04em; }
.sort-btn { background: none; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; padding: 3px 10px; font-size: 12px; cursor: pointer; color: #666; }
.sort-btn:hover { background: #f5f5f3; }
.row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
input[type=text], input[type=number], input[type=date] {
  border: 0.5px solid rgba(0,0,0,0.18); border-radius: 8px; padding: 6px 10px;
  font-size: 14px; width: 100%; background: #fff; color: #1a1a1a; outline: none;
  font-family: inherit;
}
input:focus { border-color: rgba(0,0,0,0.4); }
.del-btn { background: none; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 8px; width: 28px; height: 28px; cursor: pointer; color: #888; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.del-btn:hover { background: #f5f5f3; }
.add-btn { background: none; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; color: #666; margin-top: 4px; }
.add-btn:hover { background: #f5f5f3; }
.limit-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 0.5px solid rgba(0,0,0,0.08); flex-wrap: wrap; }
.rec-badge { font-size: 12px; color: #185FA5; background: #E6F1FB; border-radius: 8px; padding: 3px 10px; white-space: nowrap; }
.hint { font-size: 12px; color: #aaa; margin-top: 6px; }
.field-row { display: flex; gap: 12px; align-items: center; margin-bottom: 10px; }
.field-row label { font-size: 13px; color: #666; white-space: nowrap; min-width: 130px; }
.field-row input { max-width: 160px; }
.calc-btn { width: 100%; padding: 11px; background: #1a1a1a; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; color: #fff; margin-bottom: 1rem; }
.calc-btn:hover { background: #333; }
.metrics { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-bottom: 1rem; }
.metric { background: #f5f5f3; border-radius: 8px; padding: 12px; }
.metric-label { font-size: 11px; color: #888; margin-bottom: 4px; }
.metric-value { font-size: 17px; font-weight: 500; color: #1a1a1a; }
.metric-value.danger { color: #A32D2D; }
.metric-value.success { color: #3B6D11; }
.chart-wrap { width: 100%; background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 1rem; margin-bottom: 8px; display: none; }
.chart-note { font-size: 12px; color: #aaa; text-align: center; margin-bottom: 1rem; display: none; }
.legend { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #666; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; }
.freq { display: flex; gap: 4px; flex-shrink: 0; }
.freq label { font-size: 11px; color: #888; cursor: pointer; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 6px; padding: 2px 6px; white-space: nowrap; user-select: none; }
.freq input[type=radio] { display: none; }
.freq input[type=radio]:checked + label { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.entry-row { flex-wrap: wrap; }
.entry-row .freq { width: 100%; padding-left: 0; }
@media (min-width: 480px) {
  .entry-row { flex-wrap: nowrap; }
  .entry-row .freq { width: auto; }
}
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <h1 id="t-title">Калькулятор дневного лимита</h1>
    <div class="controls">
      <button class="toggle-btn active" id="btn-ru" onclick="setLang('ru')">RU</button>
      <button class="toggle-btn" id="btn-en" onclick="setLang('en')">EN</button>
      <button class="toggle-btn active" id="btn-rub" onclick="setCurrency('rub')">₽</button>
      <button class="toggle-btn" id="btn-usd" onclick="setCurrency('usd')">$</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title" style="margin-bottom:12px;" id="t-section-main">Стартовые данные</div>
    <div class="field-row">
      <label id="t-balance">Баланс сейчас, ₽</label>
      <input type="number" id="balance" value="50000" step="0.01">
    </div>
    <div class="field-row">
      <label id="t-horizon">До какой даты</label>
      <input type="date" id="horizon">
    </div>
    <div class="field-row">
      <label id="t-minbal">Мин. остаток, ₽</label>
      <input type="number" id="minbal" value="5000" step="0.01">
    </div>
    <div class="limit-row">
      <label id="t-limit-label" style="font-size:13px; color:#666; white-space:nowrap;">Дневной лимит, ₽</label>
      <input type="number" id="custom-limit" placeholder="авто" style="max-width:130px;" step="0.01">
      <span class="rec-badge" id="rec-badge">рекомендован: —</span>
    </div>
    <div class="hint" id="t-hint">оставьте пустым — лимит посчитается автоматически</div>
  </div>

  <div class="section">
    <div class="section-header">
      <div class="section-title" id="t-incomes">Поступления</div>
      <button class="sort-btn" onclick="sortContainer('incomes','income')" id="t-sort-btn-inc">по дате ↑</button>
    </div>
    <div id="incomes"></div>
    <button class="add-btn" onclick="addRow('incomes','income')" id="t-add-inc">+ добавить</button>
  </div>

  <div class="section">
    <div class="section-header">
      <div class="section-title" id="t-expenses">Крупные траты</div>
      <button class="sort-btn" onclick="sortContainer('expenses','expense')" id="t-sort-btn-exp">по дате ↑</button>
    </div>
    <div id="expenses"></div>
    <button class="add-btn" onclick="addRow('expenses','expense')" id="t-add-exp">+ добавить</button>
  </div>

  <button class="calc-btn" onclick="calculate()" id="t-calc-btn">Посчитать</button>

  <div class="metrics" id="metrics" style="display:none;">
    <div class="metric">
      <div class="metric-label" id="t-m-limit-label">Используемый лимит</div>
      <div class="metric-value" id="m-limit">—</div>
    </div>
    <div class="metric">
      <div class="metric-label" id="t-m-min-label">Мин. баланс</div>
      <div class="metric-value" id="m-min">—</div>
    </div>
    <div class="metric">
      <div class="metric-label" id="t-m-days-label">Дней до конца</div>
      <div class="metric-value" id="m-days">—</div>
    </div>
  </div>

  <div class="chart-wrap" id="chart-wrap">
    <div class="legend">
      <span class="legend-item"><span class="legend-dot" style="background:#185FA5;"></span><span id="t-leg-balance">баланс</span></span>
      <span class="legend-item"><span class="legend-dot" style="background:#A32D2D;"></span><span id="t-leg-danger">провал ниже минимума</span></span>
      <span class="legend-item"><span class="legend-dot" style="background:rgba(163,45,45,0.35); border:1px dashed #A32D2D;"></span><span id="t-leg-min">мин. остаток</span></span>
    </div>
    <div style="position:relative; width:100%; height:220px;">
      <canvas id="chart"></canvas>
    </div>
  </div>
  <div class="chart-note" id="chart-note"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
let chartInst = null;
let lang = 'ru';
let currency = 'rub';

const T = {
  ru: {
    title: 'Калькулятор дневного лимита',
    sectionMain: 'Стартовые данные',
    balance: 'Баланс сейчас',
    horizon: 'До какой даты',
    minbal: 'Мин. остаток',
    limitLabel: 'Дневной лимит',
    hint: 'оставьте пустым — лимит посчитается автоматически',
    incomes: 'Поступления',
    expenses: 'Крупные траты',
    sortBtn: 'по дате ↑',
    addBtn: '+ добавить',
    calcBtn: 'Посчитать',
    mLimit: 'Используемый лимит',
    mMin: 'Мин. баланс',
    mDays: 'Дней до конца',
    legBalance: 'баланс',
    legDanger: 'провал ниже минимума',
    legMin: 'мин. остаток',
    rec: 'рекомендован',
    noteAbove: 'лимит на {n} выше рекомендованного — красные точки покажут провалы',
    noteBelow: 'лимит на {n} ниже рекомендованного — накопите запас',
    noteEqual: 'лимит совпадает с рекомендованным — баланс финиширует у минимума',
    placeholderSum: 'сумма',
    placeholderName: 'название',
    placeholderAuto: 'авто',
    freqOnce: 'раз',
    freqDaily: 'день',
    freqMonthly: 'мес',
    freqWeekly: 'нед'
  },
  en: {
    title: 'Daily Limit Calculator',
    sectionMain: 'Starting data',
    balance: 'Current balance',
    horizon: 'Until date',
    minbal: 'Min. balance',
    limitLabel: 'Daily limit',
    hint: 'leave empty — limit will be calculated automatically',
    incomes: 'Income',
    expenses: 'Expenses',
    sortBtn: 'by date ↑',
    addBtn: '+ add',
    calcBtn: 'Calculate',
    mLimit: 'Daily limit used',
    mMin: 'Min. balance',
    mDays: 'Days left',
    legBalance: 'balance',
    legDanger: 'below minimum',
    legMin: 'min. balance',
    rec: 'recommended',
    noteAbove: 'limit is {n} above recommended — red dots show shortfalls',
    noteBelow: 'limit is {n} below recommended — you will build a buffer',
    noteEqual: 'limit matches recommended — balance will finish at minimum',
    placeholderSum: 'amount',
    placeholderName: 'name',
    placeholderAuto: 'auto',
    freqOnce: 'once',
    freqDaily: 'day',
    freqMonthly: 'mo',
    freqWeekly: 'wk'
  }
};

const C = {
  rub: { sym: '₽', dec: 2, loc: 'ru', prefix: false },
  usd: { sym: '$', dec: 2, loc: 'en-US', prefix: true }
};

function fmt(n) {
  const c = C[currency];
  const num = n.toLocaleString(c.loc, { minimumFractionDigits: c.dec, maximumFractionDigits: c.dec });
  return c.prefix ? c.sym + num : num + ' ' + c.sym;
}

function applyLang() {
  const t = T[lang];
  const c = C[currency];
  document.getElementById('t-title').textContent = t.title;
  document.getElementById('t-section-main').textContent = t.sectionMain;
  document.getElementById('t-balance').textContent = t.balance + ', ' + c.sym;
  document.getElementById('t-horizon').textContent = t.horizon;
  document.getElementById('t-minbal').textContent = t.minbal + ', ' + c.sym;
  document.getElementById('t-limit-label').textContent = t.limitLabel + ', ' + c.sym;
  document.getElementById('t-hint').textContent = t.hint;
  document.getElementById('t-incomes').textContent = t.incomes;
  document.getElementById('t-expenses').textContent = t.expenses;
  document.getElementById('t-sort-btn-inc').textContent = t.sortBtn;
  document.getElementById('t-sort-btn-exp').textContent = t.sortBtn;
  document.getElementById('t-add-inc').textContent = t.addBtn;
  document.getElementById('t-add-exp').textContent = t.addBtn;
  document.getElementById('t-calc-btn').textContent = t.calcBtn;
  document.getElementById('t-m-limit-label').textContent = t.mLimit;
  document.getElementById('t-m-min-label').textContent = t.mMin;
  document.getElementById('t-m-days-label').textContent = t.mDays;
  document.getElementById('t-leg-balance').textContent = t.legBalance;
  document.getElementById('t-leg-danger').textContent = t.legDanger;
  document.getElementById('t-leg-min').textContent = t.legMin;
  document.getElementById('custom-limit').placeholder = t.placeholderAuto;
  document.querySelectorAll('.income-sum, .expense-sum').forEach(function(el) { el.placeholder = t.placeholderSum + ' ' + c.sym; });
  document.querySelectorAll('.income-label, .expense-label').forEach(function(el) { el.placeholder = t.placeholderName; });
  document.querySelectorAll('.entry-row').forEach(function(row) {
    var radios = row.querySelectorAll('input[type=radio]');
    radios.forEach(function(r) {
      var lbl = row.querySelector('label[for="' + r.id + '"]');
      if (!lbl) return;
      if (r.value === 'once') lbl.textContent = t.freqOnce;
      else if (r.value === 'daily') lbl.textContent = t.freqDaily;
      else if (r.value === 'monthly') lbl.textContent = t.freqMonthly;
      else if (r.value === 'weekly') lbl.textContent = t.freqWeekly;
    });
  });
  document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-rub').classList.toggle('active', currency === 'rub');
  document.getElementById('btn-usd').classList.toggle('active', currency === 'usd');
}

function setLang(l) { lang = l; applyLang(); saveState(); }
function setCurrency(cur) { currency = cur; applyLang(); saveState(); calculate(); }

function today() { return new Date().toISOString().split('T')[0]; }

function setHorizon() {
  const d = new Date();
  d.setMonth(d.getMonth() + 2);
  document.getElementById('horizon').value = d.toISOString().split('T')[0];
}

function sortContainer(containerId, type) {
  const c = document.getElementById(containerId);
  const rows = Array.from(c.querySelectorAll('.entry-row'));
  rows.sort(function(a, b) {
    const da = a.querySelector('.' + type + '-date').value || '9999';
    const db = b.querySelector('.' + type + '-date').value || '9999';
    return da.localeCompare(db);
  });
  rows.forEach(function(r) { c.appendChild(r); });
}

function addRow(containerId, type) { addRowWithData(containerId, type, today(), '', '', 'once'); }

function addRowWithData(containerId, type, date, sum, label, freq) {
  const t = T[lang];
  const c = C[currency];
  const el = document.getElementById(containerId);
  const div = document.createElement('div');
  div.className = 'row entry-row';
  const uid = Math.random().toString(36).slice(2, 8);
  const f = freq || 'once';
  div.innerHTML =
    '<input type="date" class="' + type + '-date" value="' + (date || today()) + '" style="max-width:130px;">' +
    '<input type="number" class="' + type + '-sum" placeholder="' + t.placeholderSum + ' ' + c.sym + '" style="max-width:100px;" value="' + (sum || '') + '" step="0.01">' +
    '<input type="text" class="' + type + '-label" placeholder="' + t.placeholderName + '" value="' + (label || '') + '" style="min-width:0;">' +
    '<div class="freq">' +
      '<input type="radio" name="freq-' + uid + '" id="fo-' + uid + '" class="' + type + '-freq" value="once"' + (f === 'once' ? ' checked' : '') + '><label for="fo-' + uid + '">' + t.freqOnce + '</label>' +
      '<input type="radio" name="freq-' + uid + '" id="fd-' + uid + '" class="' + type + '-freq" value="daily"' + (f === 'daily' ? ' checked' : '') + '><label for="fd-' + uid + '">' + t.freqDaily + '</label>' +
      '<input type="radio" name="freq-' + uid + '" id="fm-' + uid + '" class="' + type + '-freq" value="monthly"' + (f === 'monthly' ? ' checked' : '') + '><label for="fm-' + uid + '">' + t.freqMonthly + '</label>' +
      '<input type="radio" name="freq-' + uid + '" id="fw-' + uid + '" class="' + type + '-freq" value="weekly"' + (f === 'weekly' ? ' checked' : '') + '><label for="fw-' + uid + '">' + t.freqWeekly + '</label>' +
    '</div>' +
    '<button class="del-btn" onclick="this.parentElement.remove(); saveState()">×</button>';
  el.appendChild(div);
}

function getRows(type) {
  const rows = document.querySelectorAll('#' + (type === 'income' ? 'incomes' : 'expenses') + ' .entry-row');
  const result = [];
  rows.forEach(function(row) {
    const dateEl = row.querySelector('.' + type + '-date');
    const sumEl = row.querySelector('.' + type + '-sum');
    const labelEl = row.querySelector('.' + type + '-label');
    const freqEl = row.querySelector('.' + type + '-freq:checked');
    const s = parseFloat(sumEl.value);
    if (dateEl.value && s > 0) {
      result.push({ date: dateEl.value, sum: s, label: labelEl.value || '', freq: freqEl ? freqEl.value : 'once' });
    }
  });
  return result;
}

function expandRows(rows, startDate, endDate) {
  const result = [];
  rows.forEach(function(r) {
    if (r.freq === 'once') {
      result.push({ date: r.date, sum: r.sum });
    } else {
      const dt = new Date(r.date);
      const end = new Date(endDate);
      while (dt <= end) {
        if (dt >= new Date(startDate)) {
          result.push({ date: dt.toISOString().split('T')[0], sum: r.sum });
        }
        if (r.freq === 'monthly') dt.setMonth(dt.getMonth() + 1);
        else if (r.freq === 'weekly') dt.setDate(dt.getDate() + 7);
        else dt.setDate(dt.getDate() + 1);
      }
    }
  });
  return result;
}

function calcRecommended(balance, minBal, days, incomes, expenses) {
  const totalIn = incomes.reduce(function(s, r) { return s + r.sum; }, 0);
  const totalOut = expenses.reduce(function(s, r) { return s + r.sum; }, 0);
  return Math.max(0, (balance + totalIn - totalOut - minBal) / days);
}

function calculate() {
  const balance = parseFloat(document.getElementById('balance').value) || 0;
  const horizon = document.getElementById('horizon').value;
  const minBal = parseFloat(document.getElementById('minbal').value) || 0;
  if (!horizon) return;

  const start = new Date(today());
  const end = new Date(horizon);
  const days = Math.round((end - start) / 86400000);
  if (days <= 0) return;

  const incomes = getRows('income');
  const expenses = getRows('expense');
  const expandedInc = expandRows(incomes, today(), horizon);
  const expandedExp = expandRows(expenses, today(), horizon);
  const recommended = calcRecommended(balance, minBal, days, expandedInc, expandedExp);
  document.getElementById('rec-badge').textContent = T[lang].rec + ': ' + fmt(recommended);

  const customVal = document.getElementById('custom-limit').value;
  const dailyLimit = customVal ? Math.max(0, parseFloat(customVal)) : recommended;

  const labels = [], balances = [], dangerPoints = [];
  let cur = balance;

  for (let d = 0; d <= days; d++) {
    const dt = new Date(start);
    dt.setDate(dt.getDate() + d);
    const ds = dt.toISOString().split('T')[0];
    labels.push(ds.slice(5));
    if (d > 0) {
      cur -= dailyLimit;
      expandedInc.forEach(function(r) { if (r.date === ds) cur += r.sum; });
      expandedExp.forEach(function(r) { if (r.date === ds) cur -= r.sum; });
    }
    const rounded = parseFloat(cur.toFixed(2));
    balances.push(rounded);
    dangerPoints.push(rounded < minBal ? rounded : null);
  }

  const minBalance = Math.min.apply(null, balances);
  const skip = Math.ceil(days / 30);
  const visLabels = labels.map(function(l, i) { return i % skip === 0 ? l : ''; });

  document.getElementById('m-limit').textContent = fmt(dailyLimit);
  document.getElementById('m-limit').className = 'metric-value ' + (dailyLimit > recommended + 0.005 ? 'danger' : 'success');
  document.getElementById('m-min').textContent = fmt(minBalance);
  document.getElementById('m-min').className = 'metric-value ' + (minBalance < minBal ? 'danger' : 'success');
  document.getElementById('m-days').textContent = days;
  document.getElementById('metrics').style.display = 'grid';

  if (chartInst) chartInst.destroy();
  document.getElementById('chart-wrap').style.display = 'block';

  chartInst = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
      labels: visLabels,
      datasets: [
        { label: T[lang].legBalance, data: balances, borderColor: '#185FA5', backgroundColor: 'rgba(24,95,165,0.08)', borderWidth: 1.5, pointRadius: 0, fill: true, tension: 0.2 },
        { label: T[lang].legDanger, data: dangerPoints, borderColor: '#A32D2D', borderWidth: 0, pointRadius: 3, pointBackgroundColor: '#A32D2D', fill: false },
        { label: T[lang].legMin, data: Array(balances.length).fill(minBal), borderColor: 'rgba(163,45,45,0.4)', borderWidth: 1, borderDash: [4,4], pointRadius: 0, fill: false }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: {
          title: function(items) {
            if (!items.length) return '';
            return labels[items[0].dataIndex] || '';
          },
          label: function(ctx) {
            if (ctx.raw === null) return null;
            return ctx.dataset.label + ': ' + fmt(ctx.raw);
          }
        }}
      },
      scales: {
        x: { ticks: { font: { size: 11 }, color: '#888' }, grid: { display: false } },
        y: { ticks: { font: { size: 11 }, color: '#888', callback: function(v) { return fmt(v); } }, grid: { color: 'rgba(0,0,0,0.05)' } }
      }
    }
  });

  const note = document.getElementById('chart-note');
  note.style.display = 'block';
  const diff = dailyLimit - recommended;
  const t = T[lang];
  if (diff > 0.005) note.textContent = t.noteAbove.replace('{n}', fmt(Math.abs(diff)));
  else if (diff < -0.005) note.textContent = t.noteBelow.replace('{n}', fmt(Math.abs(diff)));
  else note.textContent = t.noteEqual;
}

function saveState() {
  const state = {
    lang: lang, currency: currency,
    balance: document.getElementById('balance').value,
    horizon: document.getElementById('horizon').value,
    minbal: document.getElementById('minbal').value,
    customLimit: document.getElementById('custom-limit').value,
    incomes: [], expenses: []
  };
  document.querySelectorAll('#incomes .entry-row').forEach(function(row) {
    const freqEl = row.querySelector('.income-freq:checked');
    state.incomes.push({ date: row.querySelector('.income-date').value, sum: row.querySelector('.income-sum').value, label: row.querySelector('.income-label').value, freq: freqEl ? freqEl.value : 'once' });
  });
  document.querySelectorAll('#expenses .entry-row').forEach(function(row) {
    const freqEl = row.querySelector('.expense-freq:checked');
    state.expenses.push({ date: row.querySelector('.expense-date').value, sum: row.querySelector('.expense-sum').value, label: row.querySelector('.expense-label').value, freq: freqEl ? freqEl.value : 'once' });
  });
  localStorage.setItem('cashflow_state', JSON.stringify(state));
}

function loadState() {
  const raw = localStorage.getItem('cashflow_state');
  if (!raw) return false;
  try {
    const state = JSON.parse(raw);
    if (state.lang) lang = state.lang;
    if (state.currency) currency = state.currency;
    document.getElementById('balance').value = state.balance || '';
    document.getElementById('horizon').value = state.horizon || '';
    document.getElementById('minbal').value = state.minbal || '';
    document.getElementById('custom-limit').value = state.customLimit || '';
    (state.incomes || []).forEach(function(r) { addRowWithData('incomes', 'income', r.date, r.sum, r.label, r.freq || 'once'); });
    (state.expenses || []).forEach(function(r) { addRowWithData('expenses', 'expense', r.date, r.sum, r.label, r.freq || 'once'); });
    return true;
  } catch(e) { return false; }
}

document.addEventListener('input', saveState);
document.addEventListener('change', saveState);

const loaded = loadState();
if (!loaded) {
  setHorizon();
  addRow('incomes', 'income');
  addRow('expenses', 'expense');
}
applyLang();
calculate();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/cashflow-calc/sw.js');
}
</script>
</body>
</html>
